<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball Pro Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #c6ff00;
            --dark: #1b5e20;
            --danger: #d32f2f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f0;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* MOBILE OPTIMIZED POPUP */
        #matchNotification {
            position: fixed;
            top: 10px; /* Closer to top for mobile */
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 10000;
            background: #1b5e20;
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 2px solid var(--accent);
            text-align: center;
            display: none;
            width: 85%; /* Wider on mobile */
            max-width: 400px;
            transition: all 0.3s ease;
            pointer-events: none; /* Allows clicking through it */
        }

        #matchNotification.show {
            display: block;
            transform: translateX(-50%) translateY(0);
        }

        /* MOBILE OPTIMIZED BLINK */
        .court {
            border: 4px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            background: white;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
        }

        .blink-update {
            animation: mobileBlink 1.2s ease-in-out infinite;
            border-color: #fbc02d !important;
        }

        @keyframes mobileBlink {
            0% { background-color: white; }
            50% { background-color: #fff9c4; }
            100% { background-color: white; }
        }

        /* REST OF YOUR STYLES (Keep the same) */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 15px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .courts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .match-area { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 5px; }
        .team-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 10px; min-height: 120px; }
        .player-slot { padding: 8px; margin-bottom: 5px; background: white; border-radius: 5px; border: 1px solid #ddd; font-size: 0.9rem;}
        .vs-circle { background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 40px auto 0; font-weight: bold; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-sm { padding: 6px; font-size: 0.75rem; width: auto; margin: 0; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
        .is-admin .user-only { display: none; }
        .hidden { display: none !important; }
        .tag-sit { color: var(--danger); font-size: 0.7rem; display: block; margin-top: 5px; text-decoration: underline; }
    </style>
</head>
<body class="user-mode">

<div id="matchNotification">
    <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px;">Next Players Up</div>
    <div id="matchNames" style="font-size: 1.1rem; font-weight: bold; margin-top: 5px; line-height: 1.3;"></div>
</div>

<header>
    <h1 style="margin:0; font-size: 1.5rem;">Pickleball Open Play</h1>
    <div id="status-bar" style="font-size: 0.8rem; opacity: 0.8;">Connecting...</div>
</header>

<div class="main-layout">
    <aside>
        <div id="loginSection" class="card user-only">
            <input type="password" id="adminPass" placeholder="Admin PW" style="width: 60%; padding: 10px;">
            <button class="btn btn-sm btn-primary" onclick="checkAdmin()">Login</button>
        </div>
        <div id="adminDashboard" class="card admin-only">
            <button class="btn btn-danger btn-sm" onclick="endSession()">Reset All</button>
            <select id="playMode" onchange="updateMode()" style="margin: 10px 0; width: 100%; padding: 8px;">
                <option value="4on">4 on / 4 off</option>
                <option value="2on">2 on / 2 off</option>
            </select>
            <div style="text-align: center;">
                Courts: <button class="btn btn-sm" onclick="changeCourts(-1)">-</button>
                <span id="courtCountDisplay" style="font-weight:bold; margin: 0 10px;">1</span>
                <button class="btn btn-sm" onclick="changeCourts(1)">+</button>
            </div>
        </div>
        <div class="card">
            <input type="text" id="playerName" placeholder="Player Name" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
            <button class="btn btn-primary" onclick="joinQueue()">Join Queue</button>
        </div>
        <div id="queueList"></div>
    </aside>

    <main>
        <div id="courtsContainer" class="courts-grid"></div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDcXbm3UCGro4A3NPEEAHfp6ngNQ8ZtMUQ",
    authDomain: "pickleplay-59ba8.firebaseapp.com",
    databaseURL: "https://pickleplay-59ba8-default-rtdb.firebaseio.com",
    projectId: "pickleplay-59ba8",
    storageBucket: "pickleplay-59ba8.firebasestorage.app",
    messagingSenderId: "167188727754",
    appId: "1:167188727754:web:783381a771775130e17133"
  };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const stateRef = db.ref('pickleball_state');

    let state = { isAdmin: false, sessionActive: true, mode: '4on', numCourts: 1, players: [], courts: [] };
    let blinkingCourts = new Set();
    let selectedPlayer = null;

    // --- SYNC ---
    stateRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            state.mode = data.mode || '4on';
            state.numCourts = data.numCourts || 1;
            state.players = data.players || [];
            
            // Check if courts changed to trigger notifications
            const oldCourts = JSON.stringify(state.courts);
            state.courts = data.courts || [];
            
            if (oldCourts !== JSON.stringify(state.courts)) {
                detectNewMatches(JSON.parse(oldCourts), state.courts);
            }

            render(false);
        }
    });

    function pushToCloud() {
        stateRef.set({ mode: state.mode, numCourts: state.numCourts, players: state.players, courts: state.courts });
    }

    // Detect if a court just got new players
    function detectNewMatches(oldC, newC) {
        newC.forEach((court, i) => {
            const oldCourt = oldC[i];
            const isNowFull = (court.teamA.length + court.teamB.length) === 4;
            const wasNotFull = !oldCourt || (oldCourt.teamA.length + oldCourt.teamB.length) < 4;

            if (isNowFull && wasNotFull) {
                triggerMobileBlink(i);
                triggerMobilePopup(court);
            }
        });
    }

    function triggerMobileBlink(idx) {
        blinkingCourts.add(idx);
        render(false);
        setTimeout(() => {
            blinkingCourts.delete(idx);
            render(false);
        }, 4000);
    }

    function triggerMobilePopup(court) {
        const names = [...court.teamA, ...court.teamB].map(p => p.name).join(' • ');
        const popup = document.getElementById('matchNotification');
        const text = document.getElementById('matchNames');
        
        text.innerHTML = `<span style="color:var(--accent)">${court.name}</span><br>${names}`;
        popup.classList.add('show');
        
        // Mobile browsers handle timeouts better this way
        setTimeout(() => { popup.classList.remove('show'); }, 5000);
    }

    // --- LOGIC ---
    function checkAdmin() {
        if (document.getElementById('adminPass').value === 'admin123') {
            state.isAdmin = true;
            document.body.className = 'is-admin';
            document.getElementById('status-bar').innerText = "Mode: Administrator";
            render(false);
        }
    }

    function joinQueue() {
        const name = document.getElementById('playerName').value;
        if (!name) return;
        state.players.push({ id: Date.now(), name: name, gamesInRow: 0 });
        document.getElementById('playerName').value = '';
        fillCourts();
        pushToCloud();
    }

    function fillCourts() {
        // Ensure court array matches court count
        while (state.courts.length < state.numCourts) {
            state.courts.push({ name: `Court ${state.courts.length + 1}`, teamA: [], teamB: [] });
        }
        state.courts.forEach(c => {
            while ((c.teamA.length + c.teamB.length) < 4 && state.players.length > 0) {
                if (c.teamA.length < 2) c.teamA.push(state.players.shift());
                else c.teamB.push(state.players.shift());
            }
        });
    }

    function finishMatch(idx, winTeam) {
        const c = state.courts[idx];
        const winners = winTeam === 'A' ? c.teamA : c.teamB;
        const losers = winTeam === 'A' ? c.teamB : c.teamA;
        
        losers.forEach(p => { p.gamesInRow = 0; state.players.push(p); });
        
        if (state.mode === '4on') {
            winners.forEach(p => { p.gamesInRow = 0; state.players.push(p); });
            c.teamA = []; c.teamB = [];
        } else {
            winners.forEach(p => p.gamesInRow++);
            const stayers = winners.filter(p => p.gamesInRow < 2);
            winners.filter(p => p.gamesInRow >= 2).forEach(p => { p.gamesInRow = 0; state.players.push(p); });
            c.teamA = stayers.slice(0, 1);
            c.teamB = stayers.slice(1, 2);
        }
        fillCourts();
        pushToCloud();
    }

    function changeCourts(val) {
        state.numCourts = Math.max(1, state.numCourts + val);
        fillCourts();
        pushToCloud();
    }

    function updateMode() {
        state.mode = document.getElementById('playMode').value;
        pushToCloud();
    }

    function endSession() {
        if(confirm("Reset Everything?")) {
            state.players = [];
            state.courts = [];
            pushToCloud();
        }
    }

    function render(push = true) {
        if (push) pushToCloud();
        
        document.getElementById('courtCountDisplay').innerText = state.numCourts;
        const container = document.getElementById('courtsContainer');
        container.innerHTML = '';

        state.courts.forEach((c, i) => {
            const isFull = (c.teamA.length + c.teamB.length) === 4;
            const div = document.createElement('div');
            div.className = `court ${blinkingCourts.has(i) ? 'blink-update' : ''}`;
            
            const renderP = (p, team) => `
                <div class="player-slot">
                    <b>${p.name}</b>
                    <span class="tag-sit" onclick="sitOut(${i}, '${p.id}', '${team}')">Sit Out</span>
                </div>`;

            div.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px;">${c.name}</div>
                <div class="match-area">
                    <div class="team-box">${c.teamA.map(p => renderP(p, 'A')).join('')}</div>
                    <div class="vs-circle">VS</div>
                    <div class="team-box">${c.teamB.map(p => renderP(p, 'B')).join('')}</div>
                </div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn btn-primary btn-sm" onclick="finishMatch(${i}, 'A')" ${!isFull ? 'disabled' : ''}>T1 Wins</button>
                    <button class="btn btn-primary btn-sm" onclick="finishMatch(${i}, 'B')" ${!isFull ? 'disabled' : ''}>T2 Wins</button>
                </div>
            `;
            container.appendChild(div);
        });

        const qList = document.getElementById('queueList');
        qList.innerHTML = '<h3>Queue</h3>';
        state.players.forEach((p, i) => {
            qList.innerHTML += `<div class="card" style="padding:10px; margin-bottom:5px;">${i+1}. ${p.name}</div>`;
        });
    }

    function sitOut(cIdx, pId, team) {
        const court = state.courts[cIdx];
        const arr = team === 'A' ? court.teamA : court.teamB;
        const pIdx = arr.findIndex(p => p.id == pId);
        if (pIdx > -1) {
            const p = arr.splice(pIdx, 1)[0];
            p.gamesInRow = 0;
            state.players.push(p);
            fillCourts();
            pushToCloud();
        }
    }
</script>
</body>
</html>
