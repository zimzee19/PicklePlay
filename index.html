<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Open Play Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --accent: #c6ff00; --dark: #1b5e20; --danger: #d32f2f; }
        body { font-family: system-ui, sans-serif; background: #f0f2f0; margin: 0; padding-bottom: 50px; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .courts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        .court { border: 4px solid var(--primary); border-radius: 15px; padding: 20px; background: white; }
        .blink-update { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { background: white; } 50% { background: #fffde7; } 100% { background: white; } }
        .match-area { display: grid; grid-template-columns: 1fr 30px 1fr; gap: 10px; align-items: start; }
        .team-box { padding: 10px; background: #f9f9f9; border-radius: 8px; min-height: 150px; border: 1px solid #ddd; }
        .player-slot { background: white; padding: 8px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #eee; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid #ccc; font-size: 0.7rem; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .is-admin .user-only { display: none !important; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .queue-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 8px; margin-bottom: 5px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body class="user-mode">

<header>
    <h1>Pickleball Live</h1>
    <div id="status-bar">Connecting...</div>
</header>

<div class="main-layout">
    <aside>
        <section class="card user-only">
            <input type="email" id="adminEmail" placeholder="Admin Email">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Admin Login</button>
        </section>

        <section class="card admin-only">
            <h3>Admin Controls</h3>
            <button class="btn btn-primary" onclick="startSession()">Start Session</button>
            <button class="btn btn-danger" onclick="endSession()">End Session</button>
            <hr>
            <label>Courts:</label>
            <button class="btn btn-outline" onclick="changeCourts(-1)">-</button>
            <span id="courtDisplay">1</span>
            <button class="btn btn-outline" onclick="changeCourts(1)">+</button>
            <select id="playMode" onchange="updateMode()" style="margin-top:10px; width:100%">
                <option value="4on">4 on / 4 off</option>
                <option value="2on">2 on / 2 off</option>
            </select>
            <button class="btn btn-outline" onclick="auth.signOut()" style="margin-top:10px; width:100%">Logout</button>
        </section>

        <section class="card">
            <input type="text" id="playerName" placeholder="Add Player Name..." onkeypress="if(event.key === 'Enter') joinQueue()">
            <button class="btn btn-primary" style="width:100%" onclick="joinQueue()">Join Queue</button>
        </section>

        <h3>Waiting Queue</h3>
        <div id="queueList"></div>
    </aside>

    <main>
        <div id="courtsContainer" class="courts-grid"></div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG (USE YOUR KEYS) ---
    const firebaseConfig = {
        apiKey: "PASTE_HERE",
        authDomain: "PASTE_HERE",
        databaseURL: "PASTE_HERE",
        projectId: "PASTE_HERE",
        storageBucket: "PASTE_HERE",
        messagingSenderId: "PASTE_HERE",
        appId: "PASTE_HERE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const stateRef = db.ref('pickleball_state');

    let state = { isAdmin: false, sessionActive: false, mode: '4on', numCourts: 1, players: [], courts: [], lastUpdate: { timestamp: 0, courtIdx: -1 } };
    let selectedSwap = null;

    // --- AUTH & SYNC ---
    auth.onAuthStateChanged(user => {
        state.isAdmin = !!user;
        document.body.className = user ? 'is-admin' : 'user-mode';
        render();
    });

    function handleLogin() {
        auth.signInWithEmailAndPassword(document.getElementById('adminEmail').value, document.getElementById('adminPass').value)
            .catch(err => alert(err.message));
    }

    // This function handles "Differential Sync"
    function sync(full = false) {
        const updateData = {
            players: state.players,
            courts: state.courts,
            lastUpdate: state.lastUpdate
        };
        // Only include these if we are admin and doing a full session change
        if (state.isAdmin && full) {
            updateData.sessionActive = state.sessionActive;
            updateData.mode = state.mode;
            updateData.numCourts = state.numCourts;
        }
        stateRef.update(updateData).catch(err => console.warn("Sync restricted:", err.message));
    }

    stateRef.on('value', snap => {
        const data = snap.val();
        if (data) {
            state = { ...state, ...data };
            render();
        }
    });

    // --- GAME LOGIC ---
    function joinQueue() {
        const name = document.getElementById('playerName').value.trim();
        if (!name) return;
        state.players.push({ id: Date.now(), name, gamesInRow: 0 });
        document.getElementById('playerName').value = '';
        if (state.isAdmin) fillCourts();
        sync();
    }

    function moveInQueue(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= state.players.length) return;
        const temp = state.players[index];
        state.players[index] = state.players[newIndex];
        state.players[newIndex] = temp;
        sync();
    }

    function sitOut(cIdx, pId, team) {
        const teamArr = team === 'A' ? state.courts[cIdx].teamA : state.courts[cIdx].teamB;
        const pIdx = teamArr.findIndex(p => p.id === pId);
        const p = teamArr.splice(pIdx, 1)[0];
        p.gamesInRow = 0;
        state.players.push(p);
        if (state.isAdmin) fillCourts();
        sync();
    }

    function handleSwapClick(cIdx, pId, team) {
        if (!selectedSwap) {
            selectedSwap = { cIdx, pId, team };
            render();
        } else {
            const court = state.courts[cIdx];
            if (selectedSwap.cIdx === cIdx && selectedSwap.pId !== pId) {
                const srcTeam = selectedSwap.team === 'A' ? court.teamA : court.teamB;
                const destTeam = team === 'A' ? court.teamA : court.teamB;
                const srcIdx = srcTeam.findIndex(p => p.id === selectedSwap.pId);
                const destIdx = destTeam.findIndex(p => p.id === pId);
                [srcTeam[srcIdx], destTeam[destIdx]] = [destTeam[destIdx], srcTeam[srcIdx]];
                sync();
            }
            selectedSwap = null;
            render();
        }
    }

    function finishMatch(idx, winTeam) {
        const c = state.courts[idx];
        const winners = winTeam === 'A' ? c.teamA : c.teamB;
        const losers = winTeam === 'A' ? c.teamB : c.teamA;
        losers.forEach(p => { p.gamesInRow = 0; state.players.push(p); });
        
        if (state.mode === '4on') {
            winners.forEach(p => { p.gamesInRow = 0; state.players.push(p); });
            c.teamA = []; c.teamB = [];
        } else {
            winners.forEach(p => p.gamesInRow++);
            const stayers = winners.filter(p => p.gamesInRow < 2);
            winners.filter(p => p.gamesInRow >= 2).forEach(p => { p.gamesInRow = 0; state.players.push(p); });
            c.teamA = stayers.slice(0, 1); c.teamB = stayers.slice(1, 2);
        }
        state.lastUpdate = { timestamp: Date.now(), courtIdx: idx };
        if (state.isAdmin) fillCourts();
        sync();
    }

    function fillCourts() {
        if (!state.sessionActive) return;
        while (state.courts.length < state.numCourts) state.courts.push({ name: `Court ${state.courts.length + 1}`, teamA: [], teamB: [] });
        state.courts.forEach(c => {
            while ((c.teamA.length + c.teamB.length) < 4 && state.players.length > 0) {
                if (c.teamA.length < 2) c.teamA.push(state.players.shift());
                else c.teamB.push(state.players.shift());
            }
        });
    }

    // --- ADMIN ACTIONS ---
    function startSession() { state.sessionActive = true; fillCourts(); sync(true); }
    function endSession() { if(confirm("End?")) { state.sessionActive = false; state.players = []; state.courts = []; sync(true); } }
    function changeCourts(v) { state.numCourts = Math.max(1, state.numCourts + v); if(state.sessionActive) fillCourts(); sync(true); }
    function updateMode() { state.mode = document.getElementById('playMode').value; sync(true); }

    // --- RENDER ---
    function render() {
        document.getElementById('status-bar').innerText = state.sessionActive ? "Session Live" : "Waiting for Admin";
        document.getElementById('courtDisplay').innerText = state.numCourts;
        
        const qList = document.getElementById('queueList');
        qList.innerHTML = '';
        state.players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'queue-item';
            div.innerHTML = `
                <span>${p.name}</span>
                <div>
                    <button class="btn-outline" onclick="moveInQueue(${i}, -1)">↑</button>
                    <button class="btn-outline" onclick="moveInQueue(${i}, 1)">↓</button>
                    <button class="btn-danger" style="padding:2px 6px" onclick="state.players.splice(${i},1); sync();">X</button>
                </div>`;
            qList.appendChild(div);
        });

        const container = document.getElementById('courtsContainer');
        container.innerHTML = '';
        if (!state.sessionActive) { container.innerHTML = "<h3>Session Inactive</h3>"; return; }

        state.courts.forEach((c, i) => {
            const courtDiv = document.createElement('div');
            courtDiv.className = `court ${state.lastUpdate.courtIdx === i ? 'blink-update' : ''}`;
            
            const pMap = (p, t) => `
                <div class="player-slot">
                    <b>${p.name}</b>
                    <div style="margin-top:5px">
                        <button class="btn-outline ${selectedSwap?.pId === p.id ? 'btn-primary' : ''}" onclick="handleSwapClick(${i}, ${p.id}, '${t}')">Swap</button>
                        <button class="btn-outline" onclick="sitOut(${i}, ${p.id}, '${t}')">Sit</button>
                    </div>
                </div>`;

            courtDiv.innerHTML = `
                <h4 style="margin:0 0 10px 0">${c.name}</h4>
                <div class="match-area">
                    <div class="team-box">${c.teamA.map(p => pMap(p, 'A')).join('')}</div>
                    <div style="font-weight:bold; text-align:center; padding-top:50px">VS</div>
                    <div class="team-box">${c.teamB.map(p => pMap(p, 'B')).join('')}</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px">
                    <button class="btn btn-primary" style="flex:1" onclick="finishMatch(${i}, 'A')">T1 Win</button>
                    <button class="btn btn-primary" style="flex:1" onclick="finishMatch(${i}, 'B')">T2 Win</button>
                </div>`;
            container.appendChild(courtDiv);
        });
    }
</script>
</body>
</html>
